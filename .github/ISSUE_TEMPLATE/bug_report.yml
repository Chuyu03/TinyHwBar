name: Bug report
description: 报告可复现的 TinyHwBar 问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请只提供复现问题所需的最小信息，不要粘贴凭据、个人路径、完整日志或用户数据。安全漏洞请使用私密漏洞报告。
  - type: input
    id: version
    attributes:
      label: TinyHwBar version
      description: 例如 v1.0.0。
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows and display environment
      description: Windows 版本、缩放比例及显示器数量。
      placeholder: Windows 11 x64, 160%, one display
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: NVIDIA GPU and driver
      description: 如问题与 GPU 无关，可填写 Not applicable。
    validations:
      required: true
  - type: dropdown
    id: power
    attributes:
      label: Power state
      options:
        - AC power
        - Battery
        - Unknown or changing
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: 请提供最小、可重复的步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checklist
      options:
        - label: 我已确认内容不包含凭据、个人数据或不必要的日志。
          required: true
        - label: 这不是需要私密报告的安全漏洞。
          required: true
