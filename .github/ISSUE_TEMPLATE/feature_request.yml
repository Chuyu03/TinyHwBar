name: Feature request
description: 提议一个符合 TinyHwBar 范围的新功能
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        TinyHwBar 优先保持单行、低资源、本地优先和无额外依赖。默认网络活动仅限本地网关 ICMP；更新、遥测与本机 API 默认关闭。请先说明问题，再说明建议方案。
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: 当前使用中遇到了什么具体问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: 描述最小可行方案及用户可见影响。
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Privacy, security, and resource impact
      description: 是否涉及网络、权限、后台进程、驱动、数据收集、依赖或明显资源开销？
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: 我理解新增或改变网络、遥测、远程控制、自动更新、驱动、依赖或数据持久化时，必须明确说明默认状态、数据边界和资源影响。
          required: true
